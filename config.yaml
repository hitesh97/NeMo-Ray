# Phase 1 — Greater-London 4G coverage digital twin configuration

# Greater London bounding box (lat/lng, WGS84). Roughly the M25 envelope.
bbox:
  lat_min: 51.28
  lat_max: 51.70
  lng_min: -0.52
  lng_max: 0.33

# Operators that together make up EE (the merger of T-Mobile UK and Orange UK).
operators:
  - T-Mobile
  - Orange

# Radio / propagation parameters
radio:
  carrier_hz: 1.8e9        # 1800 MHz — EE's primary 4G band, matches CSV Freqband=1800
  tx_power_dbm: 46.0       # default per-sector EIRP if CSV power is missing (~40W ERP)
  rx_height_m: 1.5         # receiver height for the radio map (street-level handset)
  max_depth: 5             # ray interactions (reflections + diffraction)
  cell_size_m: 25.0        # radio-map ground cell resolution
  samples_per_tx: 1000000  # ray samples per transmitter in the radio-map solver
  ray_total_cap: 1000000   # safety ceiling on ray polylines drawn across all masts
                           # (25-tile westminster_canary at ring=13 traces ~550k+)

# Tiling of the area into manageable Sionna scenes
tiling:
  tile_size_m: 2000.0      # square tile edge
  margin_m: 250.0          # extra geometry pulled in around each tile (edge reflectors)
  tx_radius_m: 1500.0      # include masts within this of the tile centre as transmitters

# Building extrusion defaults when OSM tags are missing
buildings:
  default_height_m: 9.0    # ~3 storeys
  levels_height_m: 3.0     # metres per building level
  ground_z_m: 0.0

# Low-coverage detection
coverage:
  served_threshold_dbm: -110.0   # below this = effectively no usable service
  good_threshold_dbm: -85.0      # above this = strong coverage (for colour scale)

# Phase 2 — cuOpt mast-placement optimisation (max coverage, fewest new masts).
# Uses NVIDIA's hosted cuOpt MILP service (nvapi key).
cuopt:
  # SECRET — do NOT commit a real key here. Set it in the environment instead:
  #   export CUOPT_API_KEY="nvapi-..."        (get one at https://build.nvidia.com)
  # optimize.py reads CUOPT_API_KEY first and only falls back to this value.
  api_key: ""
  url: "https://optimize.api.nvidia.com/v1/nvidia/cuopt"
  # Resilience: if the hosted endpoint above fails (network/key/outage) — or no
  # CUOPT_API_KEY is set — fall back to a LOCAL self-hosted cuOpt server on the same GPU box.
  # Start it with brev/serve-cuopt.sh (`python -m cuopt_server.cuopt_service --port 5000`).
  fallback_local: true           # set false to require the hosted endpoint (no local fallback)
  local_url: "http://localhost:5000"   # self-hosted cuOpt server (CUOPT_LOCAL_URL overrides)
  near_radius_m: 250.0           # a 25 m / 58 dBm macro mast serves weak points within this
                                 # radius — set to a realistic small-cell reach so ONE mast
                                 # covers a whole cluster of holes (few, well-spread masts)
                                 # instead of ~one mast per hole sitting on top of each other.
  coverage_radius_m: 400.0       # at longer range a new mast needs clear line-of-sight
  candidate_spacing_m: 90.0      # grid spacing of candidate new-mast sites
  new_mast_height_m: 25.0        # assumed antenna height of a proposed mast
  new_mast_power_dbm: 58.0       # assumed EIRP of a proposed macro mast
  time_limit_s: 20               # cuOpt solver time limit
  max_holes: 1200                # cap on holes optimised at once (largest gaps first);
                                 # optimisation is a regional tool — keeps the MILP and the
                                 # RT verification tractable on a Greater-London-wide run
  max_verify_tiles: 60           # cap on tiles re-simulated during RT verification

# Named subsets for quick iteration (center lat/lng + tiles per side)
subsets:
  central:        { center: [51.5074, -0.1278], tiles: 1 }   # Trafalgar Sq, single tile
  central3x3:     { center: [51.5074, -0.1278], tiles: 3 }
  canarywharf:    { center: [51.5054, -0.0235], tiles: 1 }
  battersea:      { center: [51.4791, -0.1487], tiles: 1 }
  # 8 km square spanning the City of London (~-0.089) and Canary Wharf (~-0.020).
  city_canary:    { center: [51.5094, -0.0540], tiles: 4 }
  # 10 km square from Euston/Kings Cross (NW) and Westminster across the City and
  # London Bridge/Southwark out to Canary Wharf and Greenwich (SE).
  westminster_canary: { center: [51.504, -0.067], tiles: 5 }

# The tile used for ray-path visualisation (center lat/lng)
focus_tile: [51.5074, -0.1278]

# Paths
paths:
  csv: SITEFINDER_MAY_2012.csv
  data_dir: data
  # The pipeline publishes its web artifacts (coverage.png, paths/hotspots/new_*
  # GeoJSON, summary.json) straight into the Next.js dashboard's static dir, which
  # Next serves at /raytracing/*. The RayTracingLayer polls these and renders them
  # live, so a fresh `python -m src.pipeline` run shows up in the dashboard without
  # any copy step. (Gitignored — see nemoray/.gitignore.)
  out_dir: nemoray/public/raytracing
  pbf: data/greater-london-latest.osm.pbf
  buildings_cache: data/buildings.pkl
